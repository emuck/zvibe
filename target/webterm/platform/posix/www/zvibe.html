<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>zvibe</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    background: #0e0e0e;
    color: #c8c8c8;
    font: 14px/1.6 'Courier New', Courier, monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
#toolbar {
    background: #1a1a1a;
    border-bottom: 1px solid #2a2a2a;
    padding: 6px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    flex-wrap: wrap;
}
#status-bar {
    background: #151515;
    border-bottom: 1px solid #222;
    padding: 3px 10px;
    font-size: 12px;
    color: #888;
    flex-shrink: 0;
    min-height: 22px;
}
#output {
    flex: 1;
    overflow-y: auto;
    padding: 10px 14px;
    white-space: pre-wrap;
    word-break: break-word;
}
#input-bar {
    border-top: 1px solid #2a2a2a;
    padding: 6px 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
}
#prompt-char { color: #3a3; user-select: none; }
#input-field {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #d0d0d0;
    font: inherit;
    caret-color: #3a3;
}
.msg-sys  { color: #555; }
.msg-err  { color: #844; }
.msg-echo { color: #668; }

select, button {
    background: #252525;
    color: #aaa;
    border: 1px solid #3a3a3a;
    padding: 3px 8px;
    font: 12px/1.4 'Courier New', monospace;
    cursor: pointer;
}
select:focus, button:hover { border-color: #666; outline: none; background: #2e2e2e; }
#game-select { max-width: 220px; }
#btn-reset   { margin-left: auto; }
</style>
</head>
<body>

<div id="toolbar">
    <select id="game-select"><option value="">-- select game --</option></select>
    <button id="btn-load">Load</button>
    <button id="btn-save">Save</button>
    <button id="btn-restore">Restore</button>
    <button id="btn-reset">Reset</button>
</div>
<div id="status-bar"></div>
<div id="output"></div>
<div id="input-bar">
    <span id="prompt-char">&gt;</span>
    <input id="input-field" type="text" autocomplete="off"
           spellcheck="false" disabled placeholder="waiting...">
</div>

<script>
(function () {
'use strict';

const output   = document.getElementById('output');
const inputEl  = document.getElementById('input-field');
const promptEl = document.getElementById('prompt-char');
const statusEl = document.getElementById('status-bar');
const picker   = document.getElementById('game-select');

let ws = null;

function print(text, cls) {
    const el = document.createElement('span');
    if (cls) el.className = cls;
    el.textContent = text;
    output.appendChild(el);
    output.scrollTop = output.scrollHeight;
}

function setInput(on) {
    inputEl.disabled = !on;
    promptEl.style.color = on ? '#3a3' : '#333';
    if (on) { inputEl.placeholder = ''; inputEl.focus(); }
    else inputEl.placeholder = 'waiting...';
}

function send(obj) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj)); }

function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/zvibe`);

    ws.addEventListener('open', () => {
        print('Connected.\n', 'msg-sys');
        send({ type: 'games' });
    });

    ws.addEventListener('close', () => {
        setInput(false);
        print('\nDisconnected. Reconnecting...\n', 'msg-sys');
        ws = null;
        setTimeout(connect, 3000);
    });

    ws.addEventListener('error', () => print('\nSocket error.\n', 'msg-err'));

    ws.addEventListener('message', ({ data }) => {
        let msg;
        try { msg = JSON.parse(data); } catch { print(data); return; }

        switch (msg.type) {
            case 'output':
                print(msg.text);
                setInput(!!msg.prompt);
                break;

            case 'status': {
                const loc   = msg.location || '';
                const right = (msg.hours !== undefined)
                    ? `${msg.hours}:${String(msg.minutes).padStart(2, '0')}`
                    : `Score: ${msg.score}   Turns: ${msg.turns}`;
                statusEl.textContent = loc ? `${loc}   ${right}` : right;
                break;
            }

            case 'games': {
                const prev = picker.value;
                while (picker.options.length > 1) picker.remove(1);
                (msg.list || []).slice().sort().forEach(g => picker.add(new Option(g, g)));
                if (prev && [...picker.options].some(o => o.value === prev)) picker.value = prev;
                break;
            }

            case 'busy':
                print('A session is already in progress on this device.\n', 'msg-err');
                break;

            case 'resumed':
                print('\n-- session resumed --\n', 'msg-sys');
                setInput(!!msg.prompt);
                break;

            case 'saved':
                print('\n[Saved.]\n', 'msg-sys');
                setInput(true);
                break;

            case 'error':
                print(`\n[${msg.message}]\n`, 'msg-err');
                setInput(true);
                break;
        }
    });
}

inputEl.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const text = inputEl.value;
    print(` ${text}\n`, 'msg-echo');
    send({ type: 'input', text });
    inputEl.value = '';
    setInput(false);
});

document.getElementById('btn-load').addEventListener('click', () => {
    const g = picker.value;
    if (!g) return;
    output.textContent = '';
    statusEl.textContent = '';
    setInput(false);
    send({ type: 'load', game: g });
});

document.getElementById('btn-save').addEventListener('click', () => send({ type: 'save' }));

document.getElementById('btn-restore').addEventListener('click', () => send({ type: 'restore' }));

document.getElementById('btn-reset').addEventListener('click', () => {
    if (!confirm('Reset session? Game progress will be lost.')) return;
    output.textContent = '';
    statusEl.textContent = '';
    setInput(false);
    send({ type: 'reset' });
    send({ type: 'games' });
});

connect();
}());
</script>
</body>
</html>
